// Llama al proxy de Supabase (mismo que usa app.html — sin CORS)
async function proxyCall(endpoint, method, payload){
  const r=await fetch(PROXY,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY},
    body:JSON.stringify({endpoint, method, payload})
  });
  const j=await r.json();
  if(!j.success) throw new Error(`HTTP ${j.status}: ${(j.error||'').substring(0,250)}`);
  return {loc:j.location||'', id:j.recordId||''};
}

  });

}

async function processOne(w){
  lg(`▶ WO#${w.wo} ${w.lote} — ${w.tt} pzas`,'inf');

  // PASO 1 — Assembly Build via transform (a través del proxy)
  let abId='';
  const abPayload={type:"assemblybuild",quantity:w.tt,tranDate:w.dt,
    location:{id:"22"},department:{id:"3"},memo:w.lote,
    custbody_numero_lote:w.lote,cseg_batab_segmento:{id:String(w.sg)},
    custbody54:{id:String(w.tu)},
    custbody_unidades_aprobadas:w.ap,custbody_unidades_rechazadas:w.re,custbody_unidades_desperdicio:w.de,
    inventoryDetail:{inventoryAssignment:{items:[
      {inventoryStatus:{id:"1"},quantity:w.ap,receiptInventoryNumber:w.lote},
      {inventoryStatus:{id:"3"},quantity:w.re,receiptInventoryNumber:w.lote},
      {inventoryStatus:{id:"2"},quantity:w.de,receiptInventoryNumber:w.lote}
    ]}}
  };
  const ab=await proxyCall(`/services/rest/record/v1/workorder/${w.id}/transform`,'POST',abPayload);
  abId=ab.id;
  lg(`  ✅ Assembly Build #${abId}`,'ok');

  // PASO 2 — Ajuste de Inventario
  try{
    const merma=w.re+w.de;
    const iaPayload={subsidiary:{id:"2"},tranDate:w.dt,memo:w.lote,account:{id:"1047"},
      department:{id:"3"},location:{id:"22"},
      inventoryAdjustment:{items:[{item:{id:String(w.ai)},location:{id:"22"},adjustQtyBy:-merma,memo:w.lote}]}
    };
    const ia=await proxyCall('/services/rest/record/v1/inventoryadjustment','POST',iaPayload);
    lg(`  ✅ Ajuste Inv #${ia.id} (-${merma} pzas)`,'ok');
  }catch(e){lg(`  ⚠️ Ajuste: ${e.message.substring(0,80)}`,'wn');}

  // PASO 3 — Orden de Traslado
  try{
    const toPayload={subsidiary:{id:"2"},tranDate:w.dt,memo:w.lote,
      transferlocation:{id:"22"},location:{id:"5"},
      item:{items:[{item:{id:String(w.ai)},quantity:w.ap,location:{id:"22"},memo:w.lote}]}
    };
    const to=await proxyCall('/services/rest/record/v1/transferorder','POST',toPayload);
    lg(`  ✅ OT #${to.id} (${w.ap} pzas → Teapa)`,'ok');
  }catch(e){lg(`  ⚠️ OT: ${e.message.substring(0,80)}`,'wn');}

  return abId;
}

async function runTest(){
  const w=WOS[0];
  const i=0;

  lg(`\n=== PRUEBA: WO#${w.wo} ${w.lote} ===`,'inf');
  try{

    ST[i].st='done'; ST[i].ab=ab;
    lg(`=== ✅ EXITOSO — AB:${ab} — Verifica en NetSuite, luego autoriza masivo ===`,'ok');
    document.getElementById('btnMasivo').disabled=false;
  }catch(e){
    ST[i].st='err';
    lg(`=== ❌ ${e.message} ===`,'er');
  }
  render(); renderStats();
}

async function runMasivo(){
  if(!confirm('¿Procesar 37 WOs?\n37 Assembly Builds + Ajustes + Órdenes de Traslado')) return;
  halt=false;
  document.getElementById('btnMasivo').disabled=true;
  document.getElementById('btnStop').style.display='block';
  document.getElementById('btnTest').disabled=true;
  const todo=ST.filter(s=>s.st==='wait');
  let done=0;
  lg(`\n=== MASIVO: ${todo.length} WOs ===`,'inf');
  for(const w of todo){
    if(halt){lg('⏹ DETENIDO','wn');break;}
    const i=ST.findIndex(s=>s.id===w.id);
    ST[i].st='run'; render();
    try{
      const ab=await processOne(w);
      ST[i].st='done'; ST[i].ab=ab; done++;
    }catch(e){
      ST[i].st='err';
      lg(`❌ ${w.lote}: ${e.message.substring(0,100)}`,'er');
    }
    document.getElementById('pbar').style.width=Math.round(done/todo.length*100)+'%';
    document.getElementById('ptxt').textContent=`${done}/${todo.length}`;
    render(); renderStats();
    await new Promise(r=>setTimeout(r,400));
  }
  document.getElementById('btnStop').style.display='none';
  document.getElementById('btnMasivo').disabled=false;
  document.getElementById('btnTest').disabled=false;
  lg(`=== ✅ COMPLETADO ${done}/${todo.length} ===`,'ok');
}

    <td>${BADGES[w.st]||w.st}</td>
  </tr>`).join('');

function renderStats(){
  document.getElementById('ndone').textContent=ST.filter(s=>s.st==='done').length;
  document.getElementById('nerr').textContent=ST.filter(s=>s.st==='err').length;
  document.getElementById('npend').textContent=ST.filter(s=>s.st==='wait').length;

function lg(msg,t='inf'){
  const el=document.getElementById('log');
  const cls={ok:'ok',er:'er',inf:'inf',wn:'wn'}[t];
  el.innerHTML+=`<span class="${cls}">[${new Date().toLocaleTimeString('es-MX')}] ${msg}\n</span>`;
  el.scrollTop=el.scrollHeight;
}
