async function sha256(key, msg){
  const enc = new TextEncoder();
  const k = await crypto.subtle.importKey('raw',enc.encode(key),{name:'HMAC',hash:'SHA-256'},false,['sign']);
  const s = await crypto.subtle.sign('HMAC',k,enc.encode(msg));
  return btoa(String.fromCharCode(...new Uint8Array(s)));
}

async function oauthHeader(method, url, creds){
  const ts = Math.floor(Date.now()/1000).toString();
  const nonce = crypto.randomUUID().replace(/-/g,'');
  const p = {
    oauth_consumer_key: creds.consumerKey,
    oauth_nonce: nonce,
    oauth_signature_method: 'HMAC-SHA256',
    oauth_timestamp: ts,
    oauth_token: creds.tokenId,
    oauth_version: '1.0'
  };
  const sorted = Object.keys(p).sort()
    .map(k=>`${encodeURIComponent(k)}=${encodeURIComponent(p[k])}`).join('&');
  const base = [method.toUpperCase(), encodeURIComponent(url), encodeURIComponent(sorted)].join('&');
  const sigKey = `${encodeURIComponent(creds.consumerSecret)}&${encodeURIComponent(creds.tokenSecret)}`;
  p.oauth_signature = await sha256(sigKey, base);
  return 'OAuth realm="'+ACCOUNT+'",' + Object.entries(p).map(([k,v])=>`${k}="${encodeURIComponent(v)}"`).join(',');
}

async function nsPost(path, body, creds){
  const url = BASE_URL + path;
  const auth = await oauthHeader('POST', url, creds);
  const r = await fetch(url, {
    method:'POST',
    headers:{'Authorization':auth,'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const text = await r.text();
  if(!r.ok) throw new Error(`HTTP ${r.status}: ${text.substring(0,300)}`);
  return { status: r.status, location: r.headers.get('location')||'', text };
}

function extractId(location){
  const m = location.match(/\/(\d+)(\?|$)/);
  return m ? m[1] : '';
}

async function processOne(wo, creds){
  log(`▶ [WO#${wo.wo_num}] ${wo.lote} — ${wo.total} pzas`, 'info');

  // PASO 1 — Assembly Build via transform
  const abBody = {
    type: "assemblybuild",
    quantity: wo.total,
    tranDate: wo.fecha,
    location: {id:"22"},
    department: {id:"3"},
    memo: wo.lote,
    custbody_numero_lote: wo.lote,
    cseg_batab_segmento: {id: String(wo.seg)},
    custbody54: {id: String(wo.turno)},
    custbody_unidades_aprobadas: wo.apr,
    custbody_unidades_rechazadas: wo.rec,
    custbody_unidades_desperdicio: wo.desp,
    inventoryDetail:{
      inventoryAssignment:{
        items:[
          {inventoryStatus:{id:"1"}, quantity:wo.apr,  receiptInventoryNumber:wo.lote},
          {inventoryStatus:{id:"3"}, quantity:wo.rec,  receiptInventoryNumber:wo.lote},
          {inventoryStatus:{id:"2"}, quantity:wo.desp, receiptInventoryNumber:wo.lote}
        ]
      }
    }
  };
  const ab = await nsPost(`/services/rest/record/v1/workorder/${wo.wo_id}/transform`, abBody, creds);
  const abId = extractId(ab.location);
  log(`  ✅ Assembly Build: #${abId}`, 'ok');

  // PASO 2 — Ajuste de Inventario (mermas)
  const mermas = wo.rec + wo.desp;
  let iaId = '';
  try {
    const iaBody = {
      subsidiary:{id:"2"}, tranDate:wo.fecha, memo:wo.lote,
      account:{id:"1047"}, department:{id:"3"}, location:{id:"22"},
      inventoryAdjustment:{items:[{
        item:{id:String(wo.asm_id)}, location:{id:"22"},
        adjustQtyBy: -mermas, memo: wo.lote
      }]}
    };
    const ia = await nsPost('/services/rest/record/v1/inventoryadjustment', iaBody, creds);
    iaId = extractId(ia.location);
    log(`  ✅ Ajuste Inventario: #${iaId} (-${mermas} pzas)`, 'ok');
  } catch(e){ log(`  ⚠️ Ajuste (no crítico): ${e.message.substring(0,80)}`, 'warn'); }

  // PASO 3 — Orden de Traslado
  let toId = '';
  try {
    const toBody = {
      subsidiary:{id:"2"}, tranDate:wo.fecha, memo:wo.lote,
      transferlocation:{id:"22"}, location:{id:"5"},
      item:{items:[{item:{id:String(wo.asm_id)}, quantity:wo.apr, location:{id:"22"}, memo:wo.lote}]}
    };
    const to = await nsPost('/services/rest/record/v1/transferorder', toBody, creds);
    toId = extractId(to.location);
    log(`  ✅ Orden de Traslado: #${toId} (${wo.apr} pzas → Fábrica Teapa)`, 'ok');
  } catch(e){ log(`  ⚠️ OT (no crítico): ${e.message.substring(0,80)}`, 'warn'); }

  return {abId, iaId, toId};
}

    const pct = Math.round(done/pending.length*100);
    document.getElementById('progressBar').style.width = pct+'%';
    document.getElementById('progressTxt').textContent = `${done} / ${pending.length}`;
    renderTable(); renderStats();
    await new Promise(r=>setTimeout(r,400));
  }
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('btnMasivo').disabled = false;
  document.getElementById('btnTest').disabled = false;
  log(`=== ✅ COMPLETADO: ${done}/${pending.length} ===`, 'ok');
}

function stopProcess(){ shouldStop = true; }

const ASM = {1260:'EMBLEMA BT10',1261:'EMBLEMA BH12',1262:'EMBLEMA BT12',1263:'EMBLEMA BH15',
             1254:'AVANCE BH12',1259:'EMBLEMA BH10',1279:'FORTALEZA BS12',1280:'FORTALEZA BS15',
             1290:'PRISMA BH12 C879',1304:'VITTA BP12',1321:'VITTA BP20 C800'};
const SBADGE = {
  listo: '<span class="status-badge s-listo">⏳ LISTO</span>',
  proc:  '<span class="status-badge s-proc">⏳ PROCESANDO</span>',
  done:  '<span class="status-badge s-done">✅ COMPLETADO</span>',
  error: '<span class="status-badge s-error">❌ ERROR</span>',
};

function renderTable(){
  document.getElementById('tableBody').innerHTML = state.map((w,i)=>`
    <tr>
      <td class="num" style="color:#555">${i+1}</td>
      <td class="num">${w.wo_num}</td>
      <td class="lote">${w.lote}</td>
      <td class="art">${ASM[w.asm_id]||w.asm_id}</td>
      <td class="num">${w.apr.toLocaleString()}</td>
      <td class="num">${w.rec}</td>
      <td class="num">${w.desp}</td>
      <td class="num" style="font-weight:700">${w.total.toLocaleString()}</td>
      <td class="num" style="color:#5B9BD5">${w.ab_id||'—'}</td>
      <td>${SBADGE[w.uiStatus]||w.uiStatus}</td>
    </tr>`).join('');
}

function renderStats(){
  document.getElementById('cnt-done').textContent = state.filter(s=>s.uiStatus==='done').length;
  document.getElementById('cnt-err').textContent  = state.filter(s=>s.uiStatus==='error').length;
  document.getElementById('cnt-pend').textContent = state.filter(s=>s.uiStatus==='listo').length;
}

function log(msg,type='info'){
  const el=document.getElementById('log');
  const cls={ok:'log-ok',err:'log-err',info:'log-info',warn:'log-warn'}[type];
  const ts=new Date().toLocaleTimeString('es-MX');
  el.innerHTML+=`<div class="${cls}">[${ts}] ${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

renderTable(); renderStats();
log('✅ Credenciales pre-cargadas. Haz clic en PRUEBA para comenzar.','ok');
</script>
