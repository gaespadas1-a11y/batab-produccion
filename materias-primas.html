<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Control de Materias Primas · BATAB</title>
<style>
:root{--bg:#F4F2EC;--card:#fff;--text:#23241F;--muted:#73726C;--line:#E7E4DD;--green:#0F6E56;--amber:#854F0B;--red:#A32D2D;--gray:#5F5E5A;--orange:#E07B1A;--blue:#2F6BB0}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.wrap{max-width:620px;margin:0 auto;padding:14px}
.top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.h1{font-size:19px;font-weight:600}.sub{font-size:12px;color:var(--muted);margin-top:2px}
.btn{background:none;border:0.5px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);cursor:pointer}
.btn:active{transform:scale(.98)}.btn.o{background:var(--orange);color:#fff;border:none;font-weight:500}
.clock{font-size:11px;color:var(--muted);text-align:right;margin-top:4px}
.chips{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.chip{background:var(--card);border:0.5px solid var(--line);border-radius:12px;padding:10px;cursor:pointer;text-align:left}
.chip.sel{border:2px solid var(--blue);padding:9px}
.chip .n{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:500}
.chip .v{font-size:18px;font-weight:600;margin-top:4px}.chip .v small{font-size:11px;color:var(--muted);font-weight:400}
.chip .c{font-size:11px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.dhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dhdr .lbl{letter-spacing:.08em;font-size:12px;color:var(--muted)}
.card{background:var(--card);border:0.5px solid var(--line);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer}
.card.crit{border:1.5px solid #E7B0AC}
.crow{display:flex;justify-content:space-between;align-items:flex-start}
.cname{font-size:15px;font-weight:600}.csub{font-size:12px;color:var(--muted)}
.badge{font-size:11px;font-weight:500;letter-spacing:.03em;padding:4px 10px;border-radius:8px;white-space:nowrap}
.metric{display:flex;align-items:center;gap:16px;margin:10px 0 12px}
.big{font-size:29px;font-weight:600;line-height:1}.big small{font-size:15px;color:var(--muted);font-weight:400}
.pct{font-size:13px;color:var(--muted);margin-top:4px}
.params{border-top:0.5px solid var(--line);padding-top:10px;font-size:13px}
.prow{display:flex;justify-content:space-between;padding:3px 0}.prow span:first-child{color:var(--muted)}.prow span:last-child{font-weight:500;text-align:right}
.ro{font-size:11px;color:var(--muted);margin-top:8px;font-style:italic}
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;justify-content:center;z-index:9}
.ovl.on{display:flex}
.sheet{background:var(--card);width:100%;max-width:620px;border-radius:16px 16px 0 0;padding:18px}
.sheet h3{margin:0 0 2px;font-size:16px}.sheet .s{font-size:12px;color:var(--muted);margin-bottom:14px}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;text-align:center;padding:9px;border:0.5px solid var(--line);border-radius:9px;font-size:13px;cursor:pointer;background:none;color:var(--text)}
.tab.on{background:var(--text);color:#fff;border-color:var(--text)}
.fld{margin-bottom:10px}.fld label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.fld input{width:100%;padding:10px;border:0.5px solid var(--line);border-radius:9px;font-size:15px}
.sbtn{width:100%;background:var(--orange);color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px}
.msg{font-size:13px;margin-top:8px;text-align:center}
.empty{font-size:13px;color:var(--muted);text-align:center;padding:24px}
</style></head><body><div class="wrap">
<div class="top"><div><div class="h1">Control de Materias Primas</div><div class="sub">Planta de dosificación · BATAB Teapa</div></div><div><button class="btn" onclick="load()">↻ Actualizar</button><div class="clock" id="clock">—</div></div></div>
<div class="chips" id="chips"></div>
<div class="dhdr"><span class="lbl" id="dlbl">DETALLE</span><button class="btn o" id="solBtn" onclick="solicitar()">⚠ Solicitar</button></div>
<div id="cards"></div>
</div>
<div class="ovl" id="ovl"><div class="sheet"><h3 id="mTitle">—</h3><div class="s" id="mSub"></div><div id="mBody"></div><div class="msg" id="mMsg"></div></div></div>
<script>
var API='https://szrcmvlgxxpmvgrfmxak.supabase.co/functions/v1/materias-primas-api';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6cmNtdmxneHhwbXZncmZteGFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzYxMTAsImV4cCI6MjA5MjExMjExMH0.ztJ5YzeFe9Ta-6ORZBnGYNpg7gN9fwAWZMnD33N80PM';
var HDR={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
var ORDER=['cemento','agregado','aditivo','pigmento'];
var NAMES={cemento:'Cemento',agregado:'Agregados',aditivo:'Aditivos',pigmento:'Pigmentos'};
var DATA={};var SEL='cemento';
function fmt(n){return Math.round(n).toLocaleString('es-MX');}
function pigColor(m){var x={pig_amarillo:'#D9A441',pig_rojo:'#A0392C',pig_chocolate:'#5E3A24',pig_negro:'#2E2E2E',pig_adobe:'#B5733F'};return x[m]||'#9C9A92';}
function aggColor(m){var x={polvo:['#A3A29C','#7E7D78','#C2C1BB',false],arena_fina:['#CDB68C','#AE966C','#E2D2AE',false],sello_14:['#BEBBB3','#969389','#D6D3CB',true],sello_38:['#94918A','#706D66','#B3B0A8',true],arena_gruesa:['#BC9F70','#9C8252','#D7C094',true]};return x[m]||['#9C9A92','#7C7A73','#BAB8B0',false];}
function operando(f){var fam=DATA[f];return f==='cemento'||(fam&&fam.total_nivel>0);}
function stat(c,op){if(!op&&c.nivel<=0)return'sinoperar';if(c.nivel<=0||c.nivel<c.minimo)return'critico';if(c.minimo>0&&c.nivel<c.minimo*1.3)return'precaucion';return'ok';}
var SC={ok:{t:'SUFICIENTE',b:'#E1F5EE',c:'var(--green)',f:'#1D9E75'},precaucion:{t:'PRECAUCIÓN',b:'#FAEEDA',c:'var(--amber)',f:'#E0922F'},critico:{t:'CRÍTICO',b:'#FCEBEB',c:'var(--red)',f:'#D14C3C'},sinoperar:{t:'SIN OPERAR',b:'#EFEEE9',c:'var(--gray)',f:'#C9C5BC'}};
function silo(pct,minPct,col){var top=26,bot=74,h=bot-top;var fy=(bot-h*Math.max(0,pct)/100).toFixed(1);var fh=(h*Math.max(0,pct)/100).toFixed(1);var my=(bot-h*minPct/100).toFixed(1);var g='#2E7D52';var s='';s+='<line x1="26" y1="84" x2="21" y2="96" stroke="#3A3A38" stroke-width="2"/><line x1="44" y1="84" x2="49" y2="96" stroke="#3A3A38" stroke-width="2"/>';s+='<polygon points="18,72 50,72 40,86 28,86" fill="'+g+'"/>';s+='<rect x="18" y="'+top+'" width="32" height="'+h+'" fill="#EFEDE6" stroke="#CFCBC2" stroke-width="0.6"/>';if(pct>0)s+='<rect x="18" y="'+fy+'" width="32" height="'+fh+'" fill="'+col+'"/>';s+='<rect x="18" y="36" width="32" height="6" fill="'+g+'"/><rect x="18" y="56" width="32" height="6" fill="'+g+'"/>';s+='<path d="M18 26 Q34 14 50 26 Z" fill="'+g+'"/><rect x="31" y="13" width="6" height="5" rx="1" fill="'+g+'"/>';s+='<line x1="54" y1="28" x2="54" y2="72" stroke="#9A968D" stroke-width="0.8"/>';for(var r=34;r<=70;r+=8){s+='<line x1="52" y1="'+r+'" x2="57" y2="'+r+'" stroke="#9A968D" stroke-width="0.8"/>';}s+='<line x1="16" y1="'+my+'" x2="52" y2="'+my+'" stroke="#C0392B" stroke-width="0.8" stroke-dasharray="3 3"/>';return'<svg width="60" height="96" viewBox="0 0 72 100">'+s+'</svg>';}
function pile(pct,minPct,base,dark,light,gravel){var k=pct<=0?0:Math.max(.12,pct/100);var ay=(92-64*k).toFixed(1);var lx=(36-30*k).toFixed(1);var rx=(36+30*k).toFixed(1);var s='<polygon points="36,26 6,92 66,92" fill="none" stroke="#CFCBC2" stroke-width="0.7" stroke-dasharray="3 3"/>';if(pct>0){s+='<polygon points="36,'+ay+' '+lx+',92 '+rx+',92" fill="'+base+'"/>';s+='<polygon points="36,'+ay+' '+lx+',92 36,92" fill="'+light+'" opacity="0.55"/>';s+='<polygon points="36,'+ay+' '+rx+',92 36,92" fill="'+dark+'" opacity="0.45"/>';if(gravel&&k>0.45){var pts=[[26,82],[31,86],[40,84],[45,88],[34,77],[29,89],[44,80],[38,88]];for(var i=0;i<pts.length;i++){s+='<rect x="'+pts[i][0]+'" y="'+pts[i][1]+'" width="3" height="2.4" rx="0.6" fill="'+dark+'"/>';}}}var my=(92-64*(minPct/100)).toFixed(1);s+='<line x1="8" y1="'+my+'" x2="64" y2="'+my+'" stroke="#C0392B" stroke-width="0.8" stroke-dasharray="3 3"/>';s+='<line x1="6" y1="92" x2="66" y2="92" stroke="#B9B5AC" stroke-width="1"/>';return'<svg width="64" height="96" viewBox="0 0 72 100">'+s+'</svg>';}
function tote(pct,minPct,col){var top=22,bot=86,h=bot-top;var fy=(bot-h*Math.max(0,pct)/100).toFixed(1);var fh=(h*Math.max(0,pct)/100).toFixed(1);var my=(bot-h*minPct/100).toFixed(1);var cg='#8A9096';var s='';s+='<rect x="14" y="90" width="44" height="6" rx="1" fill="#3A3A38"/><rect x="16" y="96" width="6" height="4" fill="#3A3A38"/><rect x="33" y="96" width="6" height="4" fill="#3A3A38"/><rect x="50" y="96" width="6" height="4" fill="#3A3A38"/>';s+='<rect x="16" y="'+top+'" width="40" height="'+h+'" rx="5" fill="#EDF1F3" stroke="#CBD2D6" stroke-width="0.8"/>';if(pct>0)s+='<rect x="17" y="'+fy+'" width="38" height="'+fh+'" rx="3" fill="'+col+'" opacity="0.82"/>';s+='<rect x="12" y="16" width="48" height="74" rx="4" fill="none" stroke="'+cg+'" stroke-width="2"/>';s+='<line x1="24" y1="16" x2="24" y2="90" stroke="'+cg+'" stroke-width="1.3"/><line x1="36" y1="16" x2="36" y2="90" stroke="'+cg+'" stroke-width="1.3"/><line x1="48" y1="16" x2="48" y2="90" stroke="'+cg+'" stroke-width="1.3"/>';s+='<line x1="12" y1="34" x2="60" y2="34" stroke="'+cg+'" stroke-width="1.3"/><line x1="12" y1="54" x2="60" y2="54" stroke="'+cg+'" stroke-width="1.3"/><line x1="12" y1="74" x2="60" y2="74" stroke="'+cg+'" stroke-width="1.3"/>';s+='<ellipse cx="36" cy="18" rx="6" ry="2.6" fill="#3A3A38"/>';s+='<rect x="33" y="86" width="6" height="5" fill="#5A5A57"/><rect x="35" y="82" width="2.4" height="5" fill="#2F6BB0"/><circle cx="36" cy="91" r="2" fill="#2F6BB0"/>';s+='<line x1="14" y1="'+my+'" x2="58" y2="'+my+'" stroke="#C0392B" stroke-width="0.8" stroke-dasharray="3 3"/>';return'<svg width="60" height="100" viewBox="0 0 72 104">'+s+'</svg>';}
function sack(pig){var b='#CBA97A',bd='#B0915F',s='';s+='<path d="M16 44 Q12 34 17 30 L21 27 Q24 25 26 28 Q28 25 31 27 L35 30 Q40 34 36 44 L40 86 Q26 93 12 86 Z" fill="'+b+'" stroke="rgba(0,0,0,.22)" stroke-width="0.6"/>';s+='<path d="M19 30 Q26 33 33 30" fill="none" stroke="'+bd+'" stroke-width="1"/>';s+='<path d="M38 50 L60 50 L62 88 Q50 94 36 88 Z" fill="'+b+'" stroke="rgba(0,0,0,.22)" stroke-width="0.6"/>';s+='<path d="M38 50 Q49 41 60 50 Z" fill="'+pig+'" stroke="rgba(0,0,0,.18)" stroke-width="0.4"/>';s+='<ellipse cx="49" cy="50" rx="11" ry="3" fill="none" stroke="'+bd+'" stroke-width="1"/>';return'<svg width="62" height="96" viewBox="6 22 66 78">'+s+'</svg>';}
function vessel(c,col){if(c.tipo==='silo')return silo(c.pct,c.cap>0?c.minimo/c.cap*100:0,col);if(c.tipo==='patio'){var a=aggColor(c.material);return pile(c.pct,c.cap>0?c.minimo/c.cap*100:0,a[0],a[1],a[2],a[3]);}if(c.tipo==='tote')return tote(c.pct,c.cap>0?c.minimo/c.cap*100:0,col);return sack(pigColor(c.material));}
function load(){fetch(API,{headers:HDR}).then(function(r){return r.json();}).then(function(j){if(!j.ok)throw new Error(j.error||'error');DATA=j.familias||{};render();var d=new Date();document.getElementById('clock').textContent='Actualizado '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});}).catch(function(e){document.getElementById('cards').innerHTML='<div class="empty">No se pudo cargar: '+e.message+'</div>';});}
function render(){var ch='';ORDER.forEach(function(f){var fam=DATA[f]||{contenedores:[],total_nivel:0};var op=operando(f);var worst='ok';(fam.contenedores||[]).forEach(function(c){var s=stat(c,op);if(s==='critico')worst='critico';else if(s==='precaucion'&&worst!=='critico')worst='precaucion';else if(s==='sinoperar'&&worst==='ok')worst='sinoperar';});if(!op)worst='sinoperar';var tv=f==='cemento'?(fam.total_nivel/1000).toFixed(1)+'<small> t</small>':fmt(fam.total_nivel)+'<small> '+(fam.unidad||'')+'</small>';ch+='<div class="chip'+(f===SEL?' sel':'')+'" onclick="sel(\''+f+'\')"><div class="n">'+NAMES[f]+'<span class="dot" style="background:'+SC[worst].c+'"></span></div><div class="v">'+tv+'</div><div class="c">'+(fam.contenedores||[]).length+' '+(f==='cemento'?'silos':f==='agregado'?'patios':f==='aditivo'?'totes':'sacos')+'</div></div>';});document.getElementById('chips').innerHTML=ch;
document.getElementById('dlbl').textContent='DETALLE · '+NAMES[SEL].toUpperCase();
document.getElementById('solBtn').style.display=SEL==='cemento'?'none':'inline-block';
var fam=DATA[SEL]||{contenedores:[]};var op=operando(SEL);var html='';
if(!fam.contenedores||!fam.contenedores.length){html='<div class="empty">Sin contenedores.</div>';}
fam.contenedores.forEach(function(c){var s=stat(c,op);var sc=SC[s];var unit=c.unidad;var big=SEL==='cemento'?(c.nivel/1000).toFixed(1):fmt(c.nivel);var bu=SEL==='cemento'?'t':unit;var subkg=SEL==='cemento'?(' · '+fmt(c.nivel)+' kg'):'';var capd=SEL==='cemento'?(c.cap/1000).toFixed(1)+' t':fmt(c.cap)+' '+unit;var mind=SEL==='cemento'?(c.minimo/1000).toFixed(1)+' t':fmt(c.minimo)+' '+unit;html+='<div class="card'+(s==='critico'?' crit':'')+'" onclick="openM(\''+SEL+'\',\''+c.codigo+'\')"><div class="crow"><div><div class="cname">'+c.nombre+'</div><div class="csub">'+c.codigo+(c.material?(' · '+c.material):'')+'</div></div><span class="badge" style="background:'+sc.b+';color:'+sc.c+'">'+sc.t+'</span></div><div class="metric">'+vessel(c,sc.f)+'<div><div class="big">'+big+' <small>'+bu+'</small></div><div class="pct">'+c.pct+'%'+subkg+'</div></div></div><div class="params"><div class="prow"><span>Capacidad</span><span>'+capd+'</span></div><div class="prow"><span>Mínimo</span><span>'+mind+'</span></div><div class="prow"><span>Última</span><span>'+(c.ult||'—')+'</span></div></div>'+(c.espejo?'<div class="ro">Solo lectura · se opera en la app de cemento</div>':'')+'</div>';});
document.getElementById('cards').innerHTML=html;}
function sel(f){SEL=f;render();}
function solicitar(){alert('Solicitud de OC por familia: en preparación (flujo de orden de compra). Por ahora la recepción se registra al tener la OC abierta.');}
var MC={};
function openM(f,cod){var fam=DATA[f];var c=(fam.contenedores||[]).filter(function(x){return x.codigo===cod;})[0];if(!c)return;MC={f:f,c:c};document.getElementById('mTitle').textContent=c.nombre;document.getElementById('mSub').textContent=c.codigo+' · '+c.pct+'% · '+fmt(c.nivel)+' '+c.unidad;var mb=document.getElementById('mBody');document.getElementById('mMsg').textContent='';if(c.espejo){mb.innerHTML='<div class="empty">El cemento se opera en su propia app durante el periodo en paralelo. Aquí es solo lectura.</div>';}else{mb.innerHTML='<div class="tabs"><button class="tab on" id="tEnt" onclick="tab(\'ent\')">Entrada</button><button class="tab" id="tCon" onclick="tab(\'con\')">Consumo</button><button class="tab" id="tLec" onclick="tab(\'lec\')">Lectura</button></div><div id="tBody"></div>';tab('ent');}document.getElementById('ovl').classList.add('on');}
function tab(t){['ent','con','lec'].forEach(function(x){var e=document.getElementById('t'+x.charAt(0).toUpperCase()+x.slice(1));if(e)e.className='tab'+(x===t?' on':'');});var u=MC.c.unidad;var b='';if(t==='ent'){b='<div class="fld"><label>Cantidad recibida ('+u+')</label><input id="f1" type="number" inputmode="decimal"/></div><div class="fld"><label>Folio de remisión</label><input id="f2"/></div><button class="sbtn" onclick="submit(\'entrada\')">Registrar entrada</button>';}else if(t==='con'){b='<div class="fld"><label>Cantidad consumida ('+u+')</label><input id="f1" type="number" inputmode="decimal"/></div><div class="fld"><label>Referencia (opcional)</label><input id="f2"/></div><button class="sbtn" onclick="submit(\'consumo\')">Registrar consumo</button>';}else{b='<div class="fld"><label>Nivel real medido ('+u+')</label><input id="f1" type="number" inputmode="decimal"/></div><div class="fld"><label>Referencia (opcional)</label><input id="f2"/></div><button class="sbtn" onclick="submit(\'lectura\')">Registrar lectura</button>';}document.getElementById('tBody').innerHTML=b;}
function submit(action){var v1=parseFloat(document.getElementById('f1').value);var v2=document.getElementById('f2').value;var msg=document.getElementById('mMsg');if(isNaN(v1)){msg.style.color='var(--red)';msg.textContent='Captura una cantidad válida.';return;}var body;if(action==='entrada'){if(!v2){msg.style.color='var(--red)';msg.textContent='Falta el folio de remisión.';return;}body={action:'entrada',familia:MC.f,material:MC.c.material,folio:v2,units:[{contenedor:MC.c.codigo,cantidad:v1}],registrado_por:'planta'};}else if(action==='consumo'){body={action:'consumo',contenedor:MC.c.codigo,cantidad:v1,ref:v2||'consumo'};}else{body={action:'lectura',contenedor:MC.c.codigo,nivel:v1,ref:v2||'lectura'};}msg.style.color='var(--muted)';msg.textContent='Enviando…';fetch(API,{method:'POST',headers:HDR,body:JSON.stringify(body)}).then(function(r){return r.json();}).then(function(j){if(j.ok){closeM();load();}else{msg.style.color='var(--red)';msg.textContent=j.error||'No se pudo registrar.';}}).catch(function(e){msg.style.color='var(--red)';msg.textContent=e.message;});}
function closeM(){document.getElementById('ovl').classList.remove('on');}
document.getElementById('ovl').addEventListener('click',function(e){if(e.target===this)closeM();});
load();setInterval(load,45000);
</script></body></html>
