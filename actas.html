<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-calidad-32.png">
<link rel="apple-touch-icon" href="icons/icon-calidad-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-calidad-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/icon-calidad-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-calidad-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calidad">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Calidad">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="calidad.webmanifest">
<title>Lotes · Calidad BATAB</title>
<style>
  :root{
    --bg:#0d1117;--panel:#161b22;--panel2:#1c232c;--line:#2d333b;
    --txt:#e6edf3;--muted:#8b949e;--green:#3fb950;--amber:#d4a72c;--red:#f85149;--blue:#58a6ff;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--sans);line-height:1.5;
    -webkit-font-smoothing:antialiased;padding-bottom:40px}
  .wrap{max-width:920px;margin:0 auto;padding:0 16px}
  a{color:inherit;text-decoration:none}

  header{padding:22px 0 14px}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;
    letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .brand .mk{width:28px;height:28px;border-radius:6px;object-fit:cover;display:inline-block;vertical-align:middle}
  h1{font-size:22px;margin:0 0 4px;font-weight:700}
  .sub{color:var(--muted);font-size:13px;font-family:var(--mono)}

  .toolbar{position:sticky;top:0;background:rgba(13,17,23,.94);backdrop-filter:blur(8px);
    padding:12px 0;z-index:10;border-bottom:1px solid var(--line)}
  .search{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    color:var(--txt);font-size:15px;padding:12px 14px;font-family:var(--sans)}
  .search::placeholder{color:var(--muted)}
  .filters{display:flex;gap:7px;margin-top:10px;overflow-x:auto;padding-bottom:2px}
  .fchip{flex:0 0 auto;font-size:12px;font-family:var(--mono);color:var(--muted);background:var(--panel);
    border:1px solid var(--line);border-radius:20px;padding:6px 13px;cursor:pointer;white-space:nowrap}
  .fchip.on{background:var(--txt);color:var(--bg);border-color:var(--txt);font-weight:600}

  .list{margin-top:14px;display:flex;flex-direction:column;gap:10px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 15px}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .lote{font-family:var(--mono);font-size:19px;font-weight:700;letter-spacing:.02em}
  .prod{font-size:13px;color:var(--muted);margin-top:2px}
  .qty{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:right;white-space:nowrap}
  .qty b{color:var(--txt);font-size:15px;display:block}
  .facts{display:flex;gap:7px;flex-wrap:wrap;margin:9px 0 4px}
  .tag{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--panel2);
    border:1px solid var(--line);border-radius:6px;padding:3px 8px}
  .gpill{font-family:var(--sans);font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px}
  .gpill.ok{background:rgba(63,185,80,.14);color:var(--green)}
  .gpill.no{background:rgba(248,81,73,.14);color:var(--red)}
  .gpill.na{background:var(--panel2);color:var(--muted);border:1px solid var(--line)}

  /* barra de avance */
  .prog{display:flex;gap:3px;margin:11px 0 3px}
  .seg{flex:1;height:6px;border-radius:3px;background:var(--panel2)}
  .seg.done{background:var(--green)}
  .seg.done.amber{background:var(--amber)}
  .prog-lab{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;
    letter-spacing:.02em;color:var(--muted);text-transform:uppercase}
  .prog-lab span{flex:1;text-align:center}
  .prog-lab span:first-child{text-align:left}.prog-lab span:last-child{text-align:right}
  .prog-lab span.cur{color:var(--txt);font-weight:700}

  .actions{display:flex;gap:8px;margin-top:12px}
  .btn{flex:1;text-align:center;padding:10px;border-radius:9px;font-weight:600;font-size:13px;
    border:1px solid var(--line);color:var(--txt);background:var(--panel2);cursor:pointer}
  .btn.wa{background:#25d366;color:#062d14;border-color:#25d366}
  .btn[disabled],.btn.off{opacity:.4;pointer-events:none}

  .state{padding:70px 20px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:14px}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--green);
    border-radius:50%;animation:s .8s linear infinite;margin:0 auto 16px}
  @keyframes s{to{transform:rotate(360deg)}}

  /* ===== ACCESO: tarjeta código + PIN (misma forma que los otros módulos) ===== */
  .calov{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:22px;
    background:linear-gradient(180deg,#0f5f7d 0%,#0a4257 100%);overflow:auto}
  .calcard{background:#fff;border-radius:22px;box-shadow:0 20px 50px rgba(0,0,0,.30);
    width:100%;max-width:360px;padding:34px 26px;text-align:center;font-family:var(--sans)}
  .callogo{width:64px;height:64px;border-radius:16px;margin:0 auto 14px;display:block;object-fit:cover;
    box-shadow:0 4px 12px rgba(13,90,122,.35)}
  .caltitle{color:#0f2b3a;font-size:22px;font-weight:800;margin:0}
  .calsub{color:#7a8a93;font-size:13px;margin:6px 0 22px}
  .calinput{width:100%;box-sizing:border-box;padding:15px 16px;margin-bottom:12px;border-radius:12px;
    font-size:16px;font-family:var(--sans);outline:none;transition:.15s}
  .calinput.cod{background:#fff;border:2px solid #cfe0e7;color:#0f2b3a;text-align:center;text-transform:uppercase;letter-spacing:2px;font-weight:600}
  .calinput.cod:focus{border-color:#0d5a7a}
  .calinput.pin{background:#eef2f4;border:2px solid #eef2f4;color:#0f2b3a;text-align:center;letter-spacing:6px}
  .calinput.pin:focus{border-color:#0d5a7a;background:#fff}
  .calbtn{width:100%;padding:15px;border:0;border-radius:12px;background:#0d5a7a;color:#fff;
    font-size:16px;font-weight:700;font-family:var(--sans);cursor:pointer;margin-top:4px}
  .calbtn:active{background:#0a4257}
  .calbtn[disabled]{opacity:.6;pointer-events:none}
  .calerr{color:#C0392B;font-size:13px;font-weight:600;height:18px;margin:12px 0 0}
  .calfoot{color:#9fb0b8;font-size:12px;margin-top:22px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><img class="mk" src="icons/icon-calidad-120.png" alt="Sello de Calidad BATAB"> BATAB · Control de calidad</div>
    <h1>Lotes de producción</h1>
    <div class="sub" id="sub">Cargando…</div>
  </header>

  <div class="toolbar">
    <input class="search" id="search" placeholder="Buscar lote, producto, folio…" autocomplete="off">
    <div class="filters" id="filters">
      <span class="fchip on" data-f="all">Todos</span>
      <span class="fchip" data-f="q2">Q2 aprobado</span>
      <span class="fchip" data-f="qc">En QC</span>
      <span class="fchip" data-f="producido">Producido</span>
      <span class="fchip" data-f="cerrado">Cerrado</span>
      <span class="fchip" data-f="acta">Con acta</span>
    </div>
  </div>

  <div class="list" id="list"><div class="state"><div class="spin"></div>Cargando lotes…</div></div>
</div>

<script>
const FN = "https://szrcmvlgxxpmvgrfmxak.supabase.co/functions/v1/actas";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6cmNtdmxneHhwbXZncmZteGFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzYxMTAsImV4cCI6MjA5MjExMjExMH0.ztJ5YzeFe9Ta-6ORZBnGYNpg7gN9fwAWZMnD33N80PM";
const ACTA_URL = "acta.html";
const STAGES = [["Prod.",1],["QC",2],["Q2",3],["Cerr.",4],["Teapa",5]];

let DATA=[], filter="all", term="";
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const nf=n=>n==null?"—":Number(n).toLocaleString("es-MX");

// ═══════ ACCESO: CÓDIGO + PIN (misma forma y usuarios que los otros módulos) ═══════
const SB_URL="https://szrcmvlgxxpmvgrfmxak.supabase.co";
const SB_KEY="sb_publishable_VOhn9Z2Ev8gYK3nFKr44Sw_VngbAX4N";
async function sbRpc(fn,params){
  const r=await fetch(SB_URL+"/rest/v1/rpc/"+fn,{method:"POST",headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json",Prefer:"return=representation"},body:JSON.stringify(params||{})});
  if(!r.ok) throw new Error("RPC "+fn+": "+await r.text());
  return r.json();
}
const SESS_KEY="batab_calidad_sesion";
const ROLES_OK=["supervisor","director"];
function sesionActiva(){
  try{
    const s=sessionStorage.getItem("batab_session"); if(s){const o=JSON.parse(s); if(o&&ROLES_OK.includes(o.rol)) return o;}
    const l=localStorage.getItem(SESS_KEY); if(l){const o=JSON.parse(l); if(o.exp>Date.now()&&ROLES_OK.includes(o.op&&o.op.rol)) return o.op; localStorage.removeItem(SESS_KEY);}
  }catch(_){}
  return null;
}
function guardarSesion(op){ try{ sessionStorage.setItem("batab_session",JSON.stringify(op)); localStorage.setItem(SESS_KEY,JSON.stringify({op,exp:Date.now()+12*3600*1000})); }catch(_){}}
function cerrarSesion(){ try{ sessionStorage.removeItem("batab_session"); localStorage.removeItem(SESS_KEY); }catch(_){}; mostrarLogin(); }

async function entrar(){
  const codigo=(document.getElementById("cal-codigo")?.value||"").trim().toUpperCase();
  const pin=(document.getElementById("cal-pin")?.value||"").trim();
  const err=document.getElementById("cal-err");
  const btn=document.getElementById("cal-btn");
  if(!codigo||!pin){ err.textContent="Ingresa tu código y PIN"; return; }
  err.textContent=""; btn.disabled=true; btn.textContent="Validando…";
  try{
    const rows=await sbRpc("validar_operador_pin",{p_codigo:codigo,p_pin:pin});
    const row=Array.isArray(rows)?rows[0]:rows;
    if(!row||!row.exito){ err.textContent=(row&&row.mensaje)||"Código o PIN incorrecto"; btn.disabled=false; btn.textContent="Entrar"; return; }
    if(!ROLES_OK.includes(row.rol)){ err.textContent="Acceso denegado: solo supervisor o director"; btn.disabled=false; btn.textContent="Entrar"; return; }
    const op={id:row.operador_id,codigo:row.codigo,nombre:row.nombre,rol:row.rol,email:row.email};
    guardarSesion(op);
    const ov=document.getElementById("calov"); if(ov)ov.remove();
    load();
  }catch(e){ console.error(e); err.textContent="Error de conexión. Intenta de nuevo."; btn.disabled=false; btn.textContent="Entrar"; }
}
function mostrarLogin(){
  if(document.getElementById("calov")) return;
  document.body.insertAdjacentHTML("beforeend",'<div id="calov" class="calov"><div class="calcard">'
    +'<img src="icons/icon-calidad-180.png" alt="" class="callogo">'
    +'<h1 class="caltitle">Control de Calidad</h1>'
    +'<div class="calsub">Acceso restringido · ingresa tu código y PIN</div>'
    +'<input id="cal-codigo" class="calinput cod" maxlength="10" placeholder="Código (ej. GEH)" autocomplete="off" autocapitalize="characters" spellcheck="false">'
    +'<input id="cal-pin" class="calinput pin" type="tel" inputmode="numeric" maxlength="6" placeholder="PIN">'
    +'<div class="calerr" id="cal-err"></div>'
    +'<button id="cal-btn" class="calbtn" onclick="entrar()">Entrar</button>'
    +'<div class="calfoot">BATAB · Solo personal autorizado</div>'
    +'</div></div>');
  const cod=document.getElementById("cal-codigo"), pin=document.getElementById("cal-pin");
  setTimeout(()=>{try{cod.focus()}catch(_){}}, 100);
  pin.addEventListener("keydown",e=>{if(e.key==="Enter")entrar();});
  cod.addEventListener("keydown",e=>{if(e.key==="Enter")pin.focus();});
}

async function jget(u){
  const c=new AbortController(); const to=setTimeout(()=>c.abort(),60000);
  try{
    const r=await fetch(u,{headers:{apikey:KEY,Authorization:"Bearer "+KEY},signal:c.signal});
    clearTimeout(to);
    let j; try{ j=await r.json(); }catch(_){ return {ok:false,error:"Respuesta no válida (HTTP "+r.status+")"}; }
    if(j.ok===undefined && !r.ok) j={ok:false,error:(j.error||j.message||("HTTP "+r.status))};
    return j;
  }catch(e){ clearTimeout(to); return {ok:false,error: e.name==="AbortError" ? "Tardó demasiado (timeout ~60 s). Reintenta." : "Error de red: "+e.message}; }
}
async function load(){
  if(!sesionActiva()){ mostrarLogin(); return; }
  document.getElementById("list").innerHTML=`<div class="state"><div class="spin"></div>Consultando NetSuite… (puede tardar ~15 s)</div>`;
  const j=await jget(`${FN}?action=list&dias=90`);
  if(!j.ok){ document.getElementById("list").innerHTML=`<div class="state">⚠️ ${esc(j.error||"Error")}<br><br><button class="btn" style="max-width:220px;margin:0 auto" onclick="load()">Reintentar</button></div>`; return; }
  DATA=j.lotes||[];
  document.getElementById("sub").textContent=`${DATA.length} lotes · últimos 90 días`;
  render();
}

function match(l){
  if(filter==="acta" && !l.tiene_acta) return false;
  if(["q2","qc","producido","cerrado"].includes(filter)){
    if(filter==="cerrado"){ if(!l.cerrado) return false; }
    else if(l.etapa!==filter) return false;
  }
  if(term){
    const hay=`${l.lote} ${l.articulo} ${l.folio} ${l.linea}`.toLowerCase();
    if(!hay.includes(term)) return false;
  }
  return true;
}

function waLink(l){
  const url=`${location.origin}${location.pathname.replace(/actas\.html$/,"")}${ACTA_URL}?lote=${encodeURIComponent(l.lote)}&modo=cliente`;
  const msg=`BATAB · Certificado de calidad\nLote ${l.lote} — ${l.articulo}\nConsulta el acta con fotos aquí:\n${url}`;
  return `https://wa.me/?text=${encodeURIComponent(msg)}`;
}

function gpill(label,res){
  if(!res) return `<span class="gpill na">${label} —</span>`;
  const ok=(res||"").toLowerCase()==="pasa";
  return `<span class="gpill ${ok?"ok":"no"}">${label} ${ok?"✓":"✕"}</span>`;
}

function progress(l){
  const cur=l.etapa_orden||1;
  const amber=l.etapa==="q2";
  let segs=STAGES.map(([_,o])=>`<div class="seg ${o<=cur?"done":""} ${o<=cur&&amber?"amber":""}"></div>`).join("");
  let labs=STAGES.map(([lab,o])=>`<span class="${o===cur?"cur":""}">${lab}</span>`).join("");
  return `<div class="prog">${segs}</div><div class="prog-lab">${labs}</div>`;
}

function card(l){
  const acta=l.tiene_acta;
  return `<div class="card">
    <div class="card-top">
      <div><div class="lote">${esc(l.lote)}</div><div class="prod">${esc(l.articulo||"")}</div></div>
      <div class="qty">${l.cantidad?`<b>${nf(l.cantidad)}</b>pz`:""}</div>
    </div>
    <div class="facts">
      <span class="tag">${esc(l.linea||"")} · ${esc(l.turno||"")}</span>
      <span class="tag">${esc(l.fecha||"")}</span>
      ${gpill("G1",l.g1)} ${gpill("G2",l.g2)}
    </div>
    ${progress(l)}
    <div class="actions">
      <a class="btn ${acta?"":"off"}" href="${acta?`${ACTA_URL}?lote=${encodeURIComponent(l.lote)}`:"#"}">${acta?"Ver acta":"Sin ensaye"}</a>
      <a class="btn wa ${acta?"":"off"}" ${acta?`href="${waLink(l)}" target="_blank" rel="noopener"`:""}>Compartir</a>
    </div>
  </div>`;
}

function render(){
  const rows=DATA.filter(match);
  const el=document.getElementById("list");
  if(!rows.length){ el.innerHTML=`<div class="state">Sin resultados.</div>`; return; }
  el.innerHTML=rows.map(card).join("");
}

document.getElementById("search").addEventListener("input",e=>{term=e.target.value.trim().toLowerCase();render();});
document.getElementById("filters").addEventListener("click",e=>{
  const c=e.target.closest(".fchip"); if(!c) return;
  document.querySelectorAll(".fchip").forEach(x=>x.classList.remove("on"));
  c.classList.add("on"); filter=c.dataset.f; render();
});
load();
</script>
</body>
</html>
